<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studies Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📚 Studies Manager</h1>

        <div class="card">
            <h2>Novo Registro</h2>
            <input type="text" id="materia" placeholder="O que você estudou?">

            <div style = "display: flex; gap: 10px; margin-top: 10px;">
                <input type="number" id="horas" placeholder="Horas" min="0" style="flex:1;">
                <input type="number" id="minutos" placeholder="Minutos" min="0" max="59" style="flex:1;">
            </div>

            <button onclick="salvarEstudo()">Salvar Estudo</button>
        </div>

        <div class="stats">
            <p>Total de Horas: <span id="totalHoras">00:00</span>h</p>
        </div>

        <ul id="listaEstudos"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
